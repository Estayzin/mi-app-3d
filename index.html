<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UserInterface Tutorial</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Inter', sans-serif; }
      bim-grid { width: 100%; height: 100%; }
      #container { width: 100%; height: 100%; position: relative; overflow: hidden; }
    </style>
  </head>
  <body>
    <bim-grid id="grid">
      <bim-toolbars-container style="grid-area: header">
        <bim-toolbar label="That Open App" active>
          <bim-toolbar-section label="Navegación">
            <bim-button vertical label="Mi App" icon="solar:bookmark-square-minimalistic-bold"></bim-button>
            <bim-toolbar-group>
              <bim-button icon="solar:album-bold"></bim-button>
              <bim-button icon="solar:archive-linear"></bim-button>
              <bim-button icon="solar:battery-charge-minimalistic-broken"></bim-button>
              <bim-button icon="solar:bluetooth-square-outline"></bim-button>
            </bim-toolbar-group>
          </bim-toolbar-section>
        </bim-toolbar>
        <bim-toolbar label="Herramientas">
          <bim-toolbar-section label="BIM">
            <bim-button vertical label="Medir" icon="bx:command"></bim-button>
            <bim-button vertical label="Cortar" icon="bx:fast-forward-circle"></bim-button>
            <bim-button vertical label="Info" icon="bx:support"></bim-button>
          </bim-toolbar-section>
        </bim-toolbar>
      </bim-toolbars-container>
      <div id="my-panel" style="grid-area: sidebar; background-color: var(--bim-ui_bg-base)">
        <bim-panel label="Controles">
          <bim-panel-section label="Escena">
            <bim-text-input label="Nombre del proyecto" value="Mi App 3D"></bim-text-input>
            <bim-input label="Posición cámara" vertical>
              <bim-number-input pref="X" min="1" value="68" max="100" suffix="m" slider></bim-number-input>
              <bim-number-input pref="Y" min="1" value="23" max="100" suffix="m" slider></bim-number-input>
              <bim-number-input pref="Z" min="-50" value="-8" max="50" suffix="m" slider></bim-number-input>
            </bim-input>
            <bim-dropdown label="Categoría IFC">
              <bim-option label="IFCWALL"></bim-option>
              <bim-option label="IFCWINDOW"></bim-option>
              <bim-option label="IFCSLAB"></bim-option>
              <bim-option label="IFCDOOR"></bim-option>
            </bim-dropdown>
          </bim-panel-section>
        </bim-panel>
      </div>
      <div id="container" style="grid-area: content"></div>
    </bim-grid>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
